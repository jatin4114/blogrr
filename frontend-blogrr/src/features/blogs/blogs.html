<!DOCTYPE html>
<html lang="en">

<body>
    <!-- Hamburger button outside topbar -->
    <button class="menu-toggle" id="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Update Topbar -->
    <nav class="topbar hidden" id="topbar">
        <div class="nav-brand">
            <span>Blogrr</span>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="topbar-username"></span>
            </div>
        </div>
        <!-- Desktop Navigation Links -->
        <ul class="nav-links">
            <li><button class="nav-btn" id="explore-btn">
                <i class="fas fa-compass"></i> Explore
            </button></li>
            <li><button class="nav-btn" id="profile-btn">
                <i class="fas fa-user-circle"></i> My Profile
            </button></li>
            <li><button class="nav-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button></li>
        </ul>
        <!-- Mobile Menu Toggle -->
        <button class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Separate Mobile Navigation Menu -->
    <div class="nav-menu" id="nav-menu">
        <ul class="nav-links">
            <li><button class="nav-btn" id="mobile-explore-btn">
                <i class="fas fa-compass"></i> Explore
            </button></li>
            <li><button class="nav-btn" id="mobile-profile-btn">
                <i class="fas fa-user-circle"></i> My Profile
            </button></li>
            <li><button class="nav-btn" id="mobile-logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button></li>
        </ul>
    </div>

    <!-- Add this after the topbar -->
    <div class="welcome-banner hidden" id="welcome-banner">
        <div class="welcome-content">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="welcome-text">
                <h3>Welcome back, <span id="username-display"></span></h3>
                <p>Your story matters. Share it with the world.</p>
            </div>
        </div>
    </div>

    <!-- Auth Container -->
    <div class="auth-container" id="auth-container">
        <div class="app-header">
            <div class="d-flex center justify-center">
                <i class="fas fa-user-circle font-xxxl"></i>
                <h1>Blogrr</h1>
            </div>
            <p>Express yourself through words</p>
        </div>
        
        <!-- Auth Tabs -->
        <div class="tabs">
            <button id="login-tab" class="tab active" onclick="showLoginForm()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button id="register-tab" class="tab" onclick="showRegisterForm()">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </div>

        <!-- Login Form -->
        <div id="login-section" class="form-section active">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="login-password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="oauth-separator">
                <span>OR</span>
            </div>
            
            <button id="google-login-btn" class="oauth-btn google-btn">
                <i class="fab fa-google"></i> Login with Google
            </button>
        </div>

        <!-- Register Form -->
        <div id="register-section" class="form-section">
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="register-username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="register-email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="register-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="register-password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="register-password" required placeholder="Choose a password">
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
        </div>
    </div>

    <!-- Add Blogs Container -->
    <div class="blogs-container hidden" id="blogs-container">
        <h2>Latest Blogs</h2>
        <button class="create-blog-btn" id="create-blog-btn">
            <i class="fas fa-plus"></i>
        </button>
        <div class="blogs-grid" id="blogs-grid">
            <!-- Blogs will be loaded here -->
        </div>
    </div>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <script type="module" src="./src/main.ts"></script>
</body>
</html>
